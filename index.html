<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>광학 펌핑 자력계(OPM) 원리 시뮬레이션 - 원형편광 반영</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #control-panel {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #e0e0e0;
            padding: 15px 30px;
            border-radius: 20px;
            width: 640px;
        }
        .control-row {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-off { background-color: #e74c3c; color: white; }
        .btn-on { background-color: #2ecc71; color: white; }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
            margin-left: 20px;
        }
        .slider-container label {
            font-weight: bold;
            font-size: 15px;
            min-width: 100px;
            white-space: nowrap;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
        .slider-edge-label {
            font-size: 12px;
            color: #777;
            white-space: nowrap;
        }
        #info-panel {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            text-align: center;
            max-width: 760px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>광학 펌핑 자력계 (Optically Pumped Magnetometer)</h1>
    
    <div id="canvas-container">
        <canvas id="simCanvas" width="800" height="450"></canvas>
    </div>

    <div id="control-panel">
        <div class="control-row">
            <button id="laserBtn" class="btn-off" onclick="toggleLaser()">펌핑 레이저: OFF</button>
            
            <div class="slider-container">
                <label for="magSlider">자석 거리: <span id="magVal">0</span>%</label>
                <span class="slider-edge-label">멀리</span>
                <input type="range" id="magSlider" min="0" max="100" value="0" oninput="updateMagneticField(this.value)">
                <span class="slider-edge-label">가까이</span>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <strong>[실험 방법 및 원리]</strong><br>
        1. <strong>레이저 ON</strong>을 누르면 <strong>원형 편광(Circularly Polarized)</strong>된 빛이 방출됩니다. 빛의 전기장 벡터가 나선형으로 회전하며 진행합니다.<br>
        2. 이 회전하는 빛의 각운동량이 원자에 전달되면서, 무작위였던 원자 스핀들이 빛의 진행 방향으로 정렬(광학 펌핑)됩니다.<br>
        3. <strong>자기장 슬라이더</strong>를 밀어 자석을 가까이 가져가면, 정렬된 스핀들이 자기장 방향을 축으로 회전(세차운동)하며 신호가 흔들립니다.
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // 상태 변수
        let laserOn = false;
        let magneticStrength = 0; 
        let time = 0; // 나선형 빛과 세차운동 애니메이션을 위한 프레임 카운터
        
        // 원자 기체 세포 영역 (Vapor Cell)
        const cell = { x: 240, y: 100, width: 220, height: 220 };
        
        // 원자 데이터 생성 (20개)
        const atoms = [];
        const numAtoms = 20;
        for (let i = 0; i < numAtoms; i++) {
            atoms.push({
                x: cell.x + 20 + Math.random() * (cell.width - 40),
                y: cell.y + 20 + Math.random() * (cell.height - 40),
                vx: (Math.random() - 0.5) * 0.8,
                vy: (Math.random() - 0.5) * 0.8,
                angle: Math.random() * Math.PI * 2,
                radius: 6
            });
        }

        // 신호 데이터 기록용 (그래프)
        let signalHistory = Array(150).fill(20);
        let currentSignal = 20;

        // UI 제어 함수
        function toggleLaser() {
            laserOn = !laserOn;
            const btn = document.getElementById('laserBtn');
            btn.innerText = `펌핑 레이저: ${laserOn ? 'ON' : 'OFF'}`;
            btn.className = laserOn ? 'btn-on' : 'btn-off';
        }

        function updateMagneticField(val) {
            magneticStrength = parseInt(val);
            document.getElementById('magVal').innerText = val;
        }

        // 화살표 그리기 함수
        function drawArrow(x, y, angle, length, color, lineWidth = 2) {
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            let ex = x + Math.cos(angle) * length;
            let ey = y + Math.sin(angle) * length;
            ctx.moveTo(x, y);
            ctx.lineTo(ex, ey);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(ex, ey, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 메인 애니메이션 루프
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time++;

            // 1. 장치 배경 그리기
            // 펌핑 레이저 장치
            ctx.fillStyle = '#333';
            ctx.fillRect(30, 180, 70, 40);
            ctx.fillStyle = '#555';
            ctx.fillRect(100, 190, 15, 20);
            ctx.fillStyle = 'black';
            ctx.font = '12px sans-serif';
            ctx.fillText("펌핑 레이저", 35, 240);

            // 포토다이오드
            ctx.beginPath();
            ctx.arc(560, 200, 25, 0, Math.PI * 2);
            ctx.fillStyle = '#444';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(555, 200, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#ddd';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText("포토다이오드", 525, 245);

            // 기체 세포
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 3;
            ctx.fillStyle = 'rgba(240, 240, 250, 0.5)';
            ctx.fillRect(cell.x, cell.y, cell.width, cell.height);
            ctx.strokeRect(cell.x, cell.y, cell.width, cell.height);
            ctx.fillStyle = '#666';
            ctx.fillText("알칼리 기체 세포 (Alkali Vapor Cell)", cell.x, cell.y - 10);

            // 2. 원형 편광 빔 그리기 (수정된 핵심 부분)
            if (laserOn) {
                let startX = 115;
                let endX = 535;
                let centerY = 200;

                // 은은한 배경 광선 레이어
                let beamGrad = ctx.createLinearGradient(startX, centerY, endX, centerY);
                beamGrad.addColorStop(0, 'rgba(241, 196, 15, 0.3)');
                beamGrad.addColorStop(0.5, 'rgba(241, 196, 15, 0.15)');
                beamGrad.addColorStop(1, 'rgba(241, 196, 15, 0.05)');
                ctx.fillStyle = beamGrad;
                ctx.fillRect(startX, centerY - 25, endX - startX, 50);

                // 원형 편광 나선(Helix) 그리기 (3차원 회전 효과를 위한 2D 투영)
                ctx.save();
                ctx.lineWidth = 2;
                let steps = 180;
                let length = endX - startX;

                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    let x = startX + (i / steps) * length;
                    // 위상(Phase)에 시간 요소를 주어 파동이 오른쪽으로 이동하게 함
                    let phase = (x * 0.08) - (time * 0.15); 
                    let yOffset = Math.sin(phase) * 18; // 상하 진동
                    let zCos = Math.cos(phase);        // 앞뒤 깊이 표현 (선의 투명도로 입체감 구현)

                    let alpha = 0.2 + (zCos + 1) * 0.4; // 뒤에 있을 때는 흐리고, 앞에 올 때는 진하게
                    ctx.strokeStyle = `rgba(230, 126, 34, ${alpha})`;

                    if (i === 0) {
                        ctx.moveTo(x, centerY + yOffset);
                    } else {
                        ctx.lineTo(x, centerY + yOffset);
                    }
                }
                ctx.stroke();
                ctx.restore();

                // 원형 편광 가시화 인디케이터 (레이저 출력부 상단에 배치)
                let indX = 170;
                let indY = 145;
                
                // 회전 가이드 원
                ctx.strokeStyle = 'rgba(230, 126, 34, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(indX, indY, 15, 0, Math.PI * 2);
                ctx.stroke();

                // 회전하는 전기장 벡터 화살표
                let rotAngle = -time * 0.15; // 우원편광 방향 회전
                drawArrow(indX, indY, rotAngle, 15, '#e67e22', 2.5);

                // 인디케이터 회전 방향 화살표 머리
                ctx.beginPath();
                ctx.arc(indX + Math.cos(rotAngle-0.2)*15, indY + Math.sin(rotAngle-0.2)*15, 2, 0, Math.PI*2);
                ctx.fillStyle = '#e67e22';
                ctx.fill();

                ctx.fillStyle = '#d35400';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText("원형 편광 (우원편광)", indX - 48, indY - 22);
            }

            // 3. 자석 위치 계산 및 그리기
            let magX = 740 - (magneticStrength * 2.4);
            let magY = 380 - (magneticStrength * 0.9);

            if (magneticStrength > 0) {
                ctx.save();
                ctx.globalAlpha = magneticStrength / 100 * 0.7;
                ctx.strokeStyle = 'rgba(52, 152, 219, 0.5)';
                ctx.lineWidth = 1.5;
                for (let r = 20; r <= 60; r += 15) {
                    ctx.beginPath();
                    ctx.ellipse(magX, magY, r * 1.5, r, Math.PI / 6, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // 막대자석 본체
            ctx.save();
            ctx.translate(magX, magY);
            ctx.rotate(-Math.PI / 6);
            ctx.fillStyle = '#e74c3c'; // N
            ctx.fillRect(-25, -10, 25, 20);
            ctx.fillStyle = '#3498db'; // S
            ctx.fillRect(0, -10, 25, 20);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText("N", -18, 5);
            ctx.fillText("S", 8, 5);
            ctx.restore();
            
            ctx.fillStyle = '#333';
            ctx.font = '11px sans-serif';
            ctx.fillText("자기장원 (자석)", magX - 35, magY + 25);

            // 4. 원자 물리 연산
            let totalAlignment = 0;

            atoms.forEach(atom => {
                atom.x += atom.vx;
                atom.y += atom.vy;
                if (atom.x < cell.x + atom.radius || atom.x > cell.x + cell.width - atom.radius) atom.vx *= -1;
                if (atom.y < cell.y + atom.radius || atom.y > cell.y + cell.height - atom.radius) atom.vy *= -1;

                if (laserOn) {
                    // 원형 편광의 힘으로 0도(빛의 진행축) 방향으로 정렬 수렴
                    let diff = 0 - atom.angle;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    atom.angle += diff * 0.03; 

                    // 자기장이 있을 때 Larmor 세차운동 발생
                    if (magneticStrength > 0) {
                        atom.angle += 0.002 * magneticStrength; 
                    }
                } else {
                    if (magneticStrength > 0) {
                        atom.angle += 0.002 * magneticStrength;
                    } else {
                        atom.angle += (Math.random() - 0.5) * 0.05;
                    }
                }

                ctx.beginPath();
                ctx.arc(atom.x, atom.y, atom.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#e74c3c';
                ctx.fill();
                
                drawArrow(atom.x, atom.y, atom.angle, 16, '#c0392b');
                totalAlignment += Math.cos(atom.angle);
            });

            // 5. 투과 신호 및 그래프 계산
            let alignmentRatio = (totalAlignment / numAtoms + 1) / 2; 
            
            if (laserOn) {
                currentSignal = 40 + alignmentRatio * 90;
            } else {
                currentSignal = currentSignal * 0.9 + 20 * 0.1;
            }

            signalHistory.push(currentSignal);
            signalHistory.shift();

            // 6. 우측 상단 미니 그래프 렌더링
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.strokeRect(610, 40, 160, 80);
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(610, 40, 160, 80);
            
            ctx.beginPath();
            ctx.strokeStyle = laserOn ? '#2ecc71' : '#7f8c8d';
            ctx.lineWidth = 2;
            for(let i=0; i<signalHistory.length; i++) {
                let gx = 610 + (i / signalHistory.length) * 160;
                let gy = 120 - (signalHistory[i] / 150) * 80;
                if(i===0) ctx.moveTo(gx, gy);
                else ctx.lineTo(gx, gy);
            }
            ctx.stroke();
            
            ctx.fillStyle = '#333';
            ctx.font = '11px sans-serif';
            ctx.fillText("빛 투과 신호 (Signal)", 615, 35);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
